<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
   
</head>
<body>
  <!-- Header -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark p-4">
    <div class="container-fluid">
      <a class="navbar-brand " style="font-weight:900;padding: 10px;font-size: larger;" href="#"><i class="bi bi-cart">  </i>MyShop</a>
      <form class="d-flex ms-auto" id="searchForm">
        <input class="form-control me-2" type="search" placeholder="Search products" id="searchInput">
        <button class="btn btn-outline-light bg-warning" type="submit">Search</button>
      </form>

      <button class="btn btn-warning position-relative m-2" id="cartButton" data-toggle="modal"
      data-target="#cartModal">
      🛒 Cart
    </button>
    </div>
  </nav>

  <!-- carousal for offer -->
 <div id="offerCarousel" class="carousel slide container mt-3" data-ride="carousel">

 

  <div class="carousel-inner rounded shadow">

    <div class="carousel-item active" style="cursor:pointer;">
      <img src="https://th.bing.com/th/id/R.dc2bc5792cc1429a6e49a88e8e30817e?rik=HP3%2fXlM5AalgDA&riu=http%3a%2f%2fgoldenhourbotanicals.com%2fcdn%2fshop%2fcollections%2fGoldenhour_Lifestyle_Collection_Hi-Res_008.jpg%3fv%3d1674253511&ehk=oTFncUQc282a8Bt8vDCX1z%2fqf1lCxrQddCWH%2bxjJRJQ%3d&risl=&pid=ImgRaw&r=0" class="d-block w-100">
      <div class="carousel-caption d-none d-md-block">
        <h3 class="offer-text">30% OFF BEAUTY PRODUCT COMBO</h3>
     <button class="btn btn-warning mt-2" onclick="goToBeauty()">
     Shop Now
     </button>   
        
      </div>
    </div>

    <div class="carousel-item"  style="cursor:pointer;">
      <img src="https://images.unsplash.com/photo-1445205170230-053b83016050?q=80&w=1200&auto=format&fit=crop" class="d-block w-100">
      <div class="carousel-caption d-none d-md-block">
        <h3>Fashion Sale</h3>
        <p>Flat 50% OFF</p>
         <button class="btn btn-warning mt-2" onclick="goToFashion()">
     Shop Now
     </button>
      </div>
    </div>

    <div class="carousel-item" style="cursor:pointer;">
      <img src="https://images.unsplash.com/photo-1512820790803-83ca734da794?q=80&w=1200&auto=format&fit=crop" class="d-block w-100">
      <div class="carousel-caption d-none d-md-block">
        <h3>Books Collection</h3>
        <p>Starting ₹199</p>
         <button class="btn btn-warning mt-2" onclick="goToBooks()">
     Shop Now
     </button>
      </div>
    </div>

  </div>
  <a class="carousel-control-prev" href="#offerCarousel" role="button" data-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </a>

  <a class="carousel-control-next" href="#offerCarousel" role="button" data-slide="next">
    <span class="carousel-control-next-icon"></span>
  </a>

</div>


  <!-- modal for cart-->
  

<div class="modal fade" id="cartModal" tabindex="-1" role="dialog" aria-labelledby="cartModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="cartModalLabel">Your Cart</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span>&times;</span>
        </button>
      </div>

      <div class="modal-body">
        <ul id="cartItems" class="list-group"></ul>
        <p class="fw-bold mt-3">Total: ₹<span id="cartTotal">0</span></p>
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
      </div>

    </div>
  </div>
</div>


  <!-- Filters & Sort -->
  <div class="container mt-5">
    <div class="row mb-3 justify-content-center">
      <div class="col-md-4 ">
        <select id="categoryFilter" style="background-color:lightcyan" class="form-select">
          <option value="all">All Categories</option>
          <option value="electronics">Electronics</option>
          <option value="fashion">Fashion</option>
          <option value="books">Books</option>
          <option value="beauty">Beauty</option>
          <option value="home">Home</option>
          <option value="toys">Toys</option>
        </select>
      </div>
      <div class="col-md-4" >
        <select id="sortFilter" style="background-color:lightcyan; margin-bottom: 15px;" class="form-select">
          <option value="default">All</option>
          <option value="name">Sort by Name</option>
          <option value="price">Sort by Price</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Product Listing -->
  <div class="container">
    <div class="row" id="productList"></div>
  </div>

  <!-- Shopping Cart -->
  <!-- <div class="container mt-5" style="border: 3px solid black;">
    <h3 class="p-3 fw-bolder">Shopping Cart</h3>
    <ul class="list-group" id="cartItems"></ul>
    <p class="mt-3 fw-bold">Total: ₹<span id="cartTotal">0</span></p>
  </div> -->

 <footer class="bg-dark text-white text-center py-3 mt-5">
  <div class="container">
    <p class="mb-1">© 2026 MyShop. All rights reserved.</p>
      
    </p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
<script src="app.js"></script>
</body>

</html>
