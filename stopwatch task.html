<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stop Watch</title>
  <style>


body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  
}
#stopwatch{
      height: 400px;
      width: 400px;
      border:4px solid black;
      border-radius: 10px ;
      text-align: center;
      align-content: center;
      background-color: aliceblue;
     
      h1{
        margin:10px;
        border:2px solid black;
        border-radius: 10px;
        background-color: azure;
      }
    
       
    }

#time{
     
      display: flex;
      flex-flow:row wrap;
      align-items: center;
      padding-top: 40px;
      justify-content: space-around;
}

#hrs,#min,#sec,#msec{
      border:2px solid black;
      padding: 10px;
      border-radius: 15px;

      
}

#buttons{
padding-block: 20px;
display: flex;
flex-flow:row nowrap;
align-items: center;
justify-content: space-around;

button{
  padding: 13px;
  border-radius: 10px;
}


}
  </style>
</head>
<body>
   <div id="stopwatch">
    <h1>StopWatch</h1>
    <div id="time">
      <h1 id="hrs">00</h1>
      <h1 id="min">00</h1>
      <h1 id="sec">00</h1>
      <h1 id="msec">00</h1>
    </div>

    <div id="buttons">
      <button onclick="start()">Start</button>
      <button onclick="stop()">Stop</button>
      <button onclick="reset()">Reset</button>
    </div>
  </div>
  <script>

 let hrs=0;
    let min=0;
    let sec=0;
    let msec=0;
    let x = null;

    function stopwatch() {
      if(msec == 99){
        sec++;
        msec = 0
      }
      if(sec == 59){
        min++;
        sec = 0;
      }
      if(min == 59){
        hrs++;
        min = 0;
      }

      document.getElementById("hrs").innerHTML = hrs.toString().padStart(2,"0");
      document.getElementById("min").innerHTML = min.toString().padStart(2,"0");
      document.getElementById("sec").innerHTML = sec.toString().padStart(2,"0");
      document.getElementById("msec").innerHTML = msec.toString().padStart(2,"0");
      msec++;
      
    }

    function start() {
      if( x == null){
        x = setInterval(stopwatch, 10);
      }
    }

    function stop() {
      if (x != null){
        clearInterval(x); 
        x = null;
      }


    }

    function  reset() {
       hrs = 0;
       min = 0;
       sec = 0;
       msec = 0;

       if(x != null || x == null) {
        clearInterval(x);
          x = null;

        document.getElementById("hrs").innerHTML = hrs.toString().padStart(2,"0");

         document.getElementById("min").innerHTML = min.toString().padStart(2,"0");

          document.getElementById("sec").innerHTML = sec.toString().padStart(2,"0");

           document.getElementById("msec").innerHTML = msec.toString().padStart(2,"0");
         
        }
       }

    

    
  </script>
</body>
</html>
